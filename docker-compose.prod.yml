# docker-compose.prod.yml — Production overrides.
# No local SQL Server container; uses external database.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  db:
    # Disable local SQL Server in production
    profiles:
      - disabled

  backend:
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on: []

  frontend:
    restart: always
